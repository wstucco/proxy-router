default:
  image: golang:1.23.1

variables:
  GOTOOLCHAIN: local
  GOFLAGS: ""
  CGO_ENABLED: "1"
  BINARY_NAME: proxy-router

stages:
  - test
  - build
  - release

# ─── test ────────────────────────────────────────────────────────────────────

test:
  stage: test
  script:
    - go vet ./...
    - go test ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─── build ───────────────────────────────────────────────────────────────────
# macOS only — cgo with SystemConfiguration.framework requires darwin SDK.
# We use a self-hosted macOS runner tagged `macos`.

build:
  stage: build
  tags:
    - macos
  variables:
    GOARCH: arm64
    GOOS: darwin
  script:
    - go build -ldflags "-X main.version=${CI_COMMIT_TAG:-dev} -s -w" -o ${BINARY_NAME} ./cmd/proxy
  artifacts:
    name: "${BINARY_NAME}-${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}-darwin-arm64"
    paths:
      - ${BINARY_NAME}
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─── release ─────────────────────────────────────────────────────────────────

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build
      artifacts: true
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    name: "Release ${CI_COMMIT_TAG}"
    tag_name: "${CI_COMMIT_TAG}"
    description: |
      ## proxy-router ${CI_COMMIT_TAG}

      A local proxy that routes connections to an upstream or direct based on configurable rules.

      ### Install

      Download the binary below, then run:
      ```
      chmod +x proxy-router
      ./proxy-router install
      ```
    assets:
      links:
        - name: "proxy-router-${CI_COMMIT_TAG}-darwin-arm64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/proxy-router?job=build"
          link_type: package
  rules:
    - if: $CI_COMMIT_TAG
