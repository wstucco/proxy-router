name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ─── test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  # ─── build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: macos-14
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          go build \
            -ldflags "-X main.version=${GITHUB_REF_NAME} -s -w" \
            -o proxy-router \
            ./cmd/proxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-router-darwin-arm64
          path: proxy-router
          retention-days: 7

  # ─── release ───────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: proxy-router-darwin-arm64

      - name: Rename binary
        run: mv proxy-router proxy-router-${{ github.ref_name }}-darwin-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## proxy-router ${{ github.ref_name }}

            A local proxy that routes connections to an upstream or direct based on configurable rules.

            ### Install

            Download the binary below, then run:
            ```
            chmod +x proxy-router-${{ github.ref_name }}-darwin-arm64
            mv proxy-router-${{ github.ref_name }}-darwin-arm64 proxy-router
            ./proxy-router install
            ```
          files: proxy-router-${{ github.ref_name }}-darwin-arm64
